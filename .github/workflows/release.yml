name: Release

# Publish a DMG to a GitHub Release whenever a version tag is pushed.
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Detect signing secrets
        id: signing
        env:
          CERT: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No signing secrets set — producing an UNSIGNED DMG."
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          CERT_B64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build app
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          CODESIGN_IDENTITY: ${{ steps.signing.outputs.enabled == 'true' && secrets.MACOS_SIGN_IDENTITY || '-' }}
        run: sh build-app.sh

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: sh make-dmg.sh

      - name: Sign, notarize & staple DMG
        if: steps.signing.outputs.enabled == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --timestamp --sign "$SIGN_IDENTITY" "Deal-with-PR.dmg"
          xcrun notarytool submit "Deal-with-PR.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "Deal-with-PR.dmg"
          xcrun stapler validate "Deal-with-PR.dmg"

      - name: Generate Sparkle appcast
        if: steps.signing.outputs.enabled == 'true'
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          SPARKLE_VER=2.6.4
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VER}/Sparkle-${SPARKLE_VER}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle" && tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          printf '%s' "$SPARKLE_KEY" > "$RUNNER_TEMP/sparkle_key"
          mkdir -p "$RUNNER_TEMP/updates" && cp "Deal-with-PR.dmg" "$RUNNER_TEMP/updates/"
          "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            "$RUNNER_TEMP/updates"
          cp "$RUNNER_TEMP/updates/appcast.xml" appcast.xml
          rm -f "$RUNNER_TEMP/sparkle_key"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Deal-with-PR.dmg
            appcast.xml
          generate_release_notes: true
          fail_on_unmatched_files: false
